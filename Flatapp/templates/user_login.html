{% extends 'index.html' %}
{% load static %}
{% block body %}

        <!-- Header Start -->
        <div class="container-fluid header bg-white p-0">
            <div class="row g-0 align-items-center flex-column-reverse flex-md-row">
                <div class="col-md-6 p-5 mt-lg-5">
                    <h1 class="display-5 animated fadeIn mb-4">User Sign In</h1>
                        <nav aria-label="breadcrumb animated fadeIn">
                        <ol class="breadcrumb text-uppercase">
                            <li class="breadcrumb-item"><a href="#">Home</a></li>
                            <li class="breadcrumb-item text-body active" aria-current="page">User Sign In</li>
                        </ol>
                    </nav>
                </div>
                <div class="col-md-6 animated fadeIn">
                    <img class="img-fluid" src="{% static 'img/header.jpg' %}" alt="">
                </div>
            </div>
        </div>
        <!-- Header End -->


        <!-- Form Start -->
        <div class="container-fluid bg-primary mb-5 wow fadeIn" data-wow-delay="0.1s" style="padding: 35px;">
            <div class="container">
                <form method="post" action="" enctype="multipart/form-data">
                    {% csrf_token %}
                    <div class="row g-2 justify-content-center">
                        <div class="col-md-12">
                            <h4 class="text-center" style="color:white">User Sign In</h4>
                            <br>
                            <div class="row g-2 justify-content-center">
                                <div class="col-md-7">
                                    <input type="email" name="username" class="form-control border-0 py-3" placeholder="Email Id">
                                </div>
                                <div class="col-md-7">
                                    <input type="password" name="password" class="form-control border-0 py-3" placeholder="Password">
                                </div>
                            </div>
                            <div class="row py-3">
                                <a style="color:white; margin-left:260px" href="/forgot_password/"><i class="fa fa-key"></i> Forgot Password</a>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <button type="submit" class="btn btn-dark border-0 w-100 py-3">Sign In</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
        <!-- Form End -->


{% endblock %}
