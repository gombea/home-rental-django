{% extends 'index.html' %}
{% load static %}
{% block body %}

        <!-- Form Start -->
        <div class="container-fluid mb-5 wow fadeIn" data-wow-delay="0.1s" style="padding: 35px;">
            <div class="card container bg-primary py-4">
                <form method="post" action="" enctype="multipart/form-data">
                    {% csrf_token %}
                    <div class="row g-2 justify-content-center">
                        <div class="col-md-12">
                            <h4 class="text-center" style="color:white">Add Apartment</h4>
                            <br>
                            <div class="row g-2 justify-content-center">
                                <div class="col-md-4">
                                    <label for="name" style="color:white">Apartment Name:</label>
                                    <input type="text" id="name" name="name" class="form-control border-0 py-3" placeholder="Apartment Name" required>
                                </div>
                                <div class="col-md-4">
                                    <label for="address" style="color:white">Address:</label>
                                    <input type="text" id="address" name="address" class="form-control border-0 py-3" placeholder="Address" required>
                                </div>
                                <div class="col-md-4">
                                    <label for="city" style="color:white">City:</label>
                                    <input type="text" id="city" name="city" class="form-control border-0 py-3" placeholder="City" required>
                                </div>
                                <div class="col-md-4">
                                    <label for="state" style="color:white">State:</label>
                                    <input type="text" id="state" name="state" class="form-control border-0 py-3" placeholder="State" required>
                                </div>
                                <div class="col-md-4">
                                    <label for="rent" style="color:white">Monthly Rent:</label>
                                    <input type="number" id="rent" name="rent" class="form-control border-0 py-3" placeholder="Monthly Rent" required>
                                </div>
                                <div class="col-md-4">
                                    <label for="ebill" style="color:white">Electricity bill:</label>
                                    <input type="number" id="ebill" name="ebill" class="form-control border-0 py-3" placeholder="Electricity bill" required>
                                </div>
                                <div class="col-md-4">
                                    <label for="extra" style="color:white">Extra Features:</label>
                                    <input type="text" id="extra" name="extra" class="form-control border-0 py-3" placeholder="Extra Features" required>
                                </div>
                                <div class="col-md-4">
                                    <label for="gender" style="color:white">Gender:</label>
                                    <select id="gender" name="gender" class="form-select border-0 py-3" required>
                                        <option value="">Select Gender</option>
                                        <option value="Male">Male</option>
                                        <option value="Female">Female</option>
                                    </select>
                                </div>
                                <div class="col-md-4">
                                    <label for="select_apartment" style="color:white">Select Apartment Type:</label>
                                    <select id="select_apartment" name="atype" class="form-select border-0 py-3" required>
                                        <option value="">Select Type</option>
                                        <option value="1 BHK">1 BHK</option>
                                        <option value="2 BHK">2 BHK</option>
                                        <option value="2 RK">2 RK</option>
                                    </select>
                                </div>
                                <div class="col-md-4">
                                    <label for="setFurnish" style="color:white">Select Furnish Type:</label>
                                    <select id="setFurnish" name="furnish" class="form-select border-0 py-3" required>
                                        <option value="">Select Type</option>
                                        <option value="Full Furnished">Full Furnished</option>
                                        <option value="Semi Furnished">Semi Furnished</option>
                                        <option value="Unfurnished">Unfurnished</option>
                                    </select>
                                </div>
                                <div class="col-md-4">
                                    <label for="pic1" style="color:white">Photo 1:</label>
                                    <input type="file" name="pic1" id="pic1" class="form-control border-0 py-3" required>
                                </div>
                                <div class="col-md-4">
                                    <label for="pic2" style="color:white">Photo 2:</label>
                                    <input type="file" name="pic2" id="pic2" class="form-control border-0 py-3" required>
                                </div>
                                <div class="col-md-4">
                                    <label for="pic3" style="color:white">Photo 3:</label>
                                    <input type="file" name="pic3" id="pic3" class="form-control border-0 py-3" required>
                                </div>
                                <div class="col-md-4"></div>
                                <div class="col-md-4">
                                    <label for="pic4" style="color:white">Photo 4:</label>
                                    <input type="file" name="pic4" id="pic4" class="form-control border-0 py-3" required>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <button type="submit" class="btn btn-dark border-0 w-100 py-3">Submit</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
        <!-- Form End -->


{% endblock %}
